[project]
name = "wandb-streamlit-coding-agent"
version = "0.1.0"
description = "Streamlit code editing agent powered by W&B Inference"
requires-python = ">=3.11"
dependencies = [
    "streamlit>=1.53.0",
    "openai>=1.40.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
include = ["streamlit_app.py", "agent.py", "tools.py", "wb_client.py"]
