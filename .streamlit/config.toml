# Streamlit configuration for the W&B Coding Agent.
#
# This file is loaded automatically by Streamlit when it is launched from the
# project root (i.e. `streamlit run streamlit_app.py`). It is the source of
# truth for the local-dev experience.
#
# The packaged desktop build does NOT read this file (the bundled app's cwd at
# launch is the user's home / `/`, not this directory), so the same options
# are also passed via `--streamlit-options` from `scripts/build_desktop.py`.
# Keep the two lists in sync.

[client]
# Hide Streamlit's hamburger / Settings / Deploy chrome entirely — this
# is a local-only desktop-style tool, and exposing the framework's own
# menu would leak that the app is built with Streamlit. The in-app
# theme switcher on the Settings page (theme_switcher.py) writes the
# same ``localStorage`` key Streamlit reads on app boot, so users keep
# control of Light / Dark / System without ever seeing the toolbar.
# Options: "auto", "developer", "viewer", "minimal".
toolbarMode = "minimal"

[browser]
# This is a personal-use coding tool; do not phone home with telemetry.
gatherUsageStats = false

# Shrink the default 16px root size so body text, headings, captions, and
# code blocks all render slightly smaller, freeing screen real estate for
# the conversation pane. Streamlit's default heading sizes are defined in
# rem units relative to this value, so they scale automatically.
# ``baseFontSize`` is one of the handful of options Streamlit explicitly
# rejects per-mode (see the "Theme" section of the config.toml docs at
# https://docs.streamlit.io/develop/api-reference/configuration/config.toml ),
# so it lives at the top level. 12px is the bundled default; the in-app
# Settings page lets the user pick a different size at runtime via
# ``font_size_switcher`` (which injects a CSS override). The label that
# matches *this* value is **Small** in that switcher — keep the two in
# sync if you change either. Mirror in ``STREAMLIT_OPTIONS`` in
# ``scripts/build_desktop.py``.
[theme]
baseFontSize = 12

# Define both ``[theme.light]`` and ``[theme.dark]`` so Streamlit treats
# the app as multi-mode — that's what makes the in-app theme switcher's
# ``localStorage`` writes actually drive the rendered theme on boot. The
# frontend's ``id(e)`` check (in ``streamlit/static/static/js/utils.*.js``)
# requires each per-mode table to have at least one valid value, which
# we use to pin ``primaryColor`` to a vibrant blue (``#0080FF``) —
# replacing Streamlit's default red across buttons, links, focus rings,
# and the chat-page chat-row "primary" highlight. Mirror in
# ``STREAMLIT_OPTIONS`` in ``scripts/build_desktop.py`` (via the
# per-mode ``--theme.light.primaryColor`` / ``--theme.dark.primaryColor``
# flags) so packaged builds pick up the same color; the bundled ``.app``
# does not read this file at runtime.
[theme.light]
primaryColor = "#0080FF"

[theme.dark]
primaryColor = "#0080FF"
