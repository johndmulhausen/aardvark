# Streamlit configuration for the W&B Coding Agent.
#
# This file is loaded automatically by Streamlit when it is launched from the
# project root (i.e. `streamlit run streamlit_app.py`). It is the source of
# truth for the local-dev experience.
#
# The packaged desktop build does NOT read this file (the bundled app's cwd at
# launch is the user's home / `/`, not this directory), so the same options
# are also passed via `--streamlit-options` from `scripts/build_desktop.py`.
# Keep the two lists in sync.

[client]
# We render this app as a local-only desktop-style tool, so we don't want the
# "Deploy" button or developer-mode hamburger menu, but we DO want the
# Settings menu's built-in light/dark/system toggle to stay reachable —
# otherwise users have no way to switch theme at runtime (Streamlit doesn't
# expose a programmatic theme switch). Options: "auto", "developer",
# "viewer", "minimal". "viewer" hides the Deploy button and developer
# tooling but keeps Settings.
toolbarMode = "viewer"

[browser]
# This is a personal-use coding tool; do not phone home with telemetry.
gatherUsageStats = false

# Shrink the default 16px root size so body text, headings, captions, and
# code blocks all render slightly smaller, freeing screen real estate for
# the conversation pane. Streamlit's default heading sizes are defined in
# rem units relative to this value, so they scale automatically.
#
# Streamlit only enables the in-app light/dark toggle when BOTH
# ``[theme.light]`` and ``[theme.dark]`` sections are defined; defining a
# single top-level ``[theme]`` table locks the app to one mode. So we
# duplicate ``baseFontSize`` into each section instead of putting it in a
# shared ``[theme]`` block, preserving the OS-follow / manual-toggle
# behavior the user gets out of the box.
[theme.light]
baseFontSize = 14

[theme.dark]
baseFontSize = 14
